name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest]
        python-version: ["3.11"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install system dependencies for wxPython (Linux only)
        if: runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
          APT_LISTCHANGES_FRONTEND: none
        run: |
          sudo apt-get -q update
          sudo apt-get -q -y install \
            libnotify4 \
            libwebkit2gtk-4.1-0 \
            freeglut3-dev \
            libgtk-3-0 \
            libjpeg-turbo8 \
            libpng16-16 \
            libsm6 \
            libtiff6 \
            libxext6 \
            libxrender1 \
            libgl1 \
            libgstreamer1.0-0 \
            libgstreamer-plugins-base1.0-0 \
            libsdl2-2.0-0

      # Optionally install wxPython dependencies for macOS
      - name: Install system dependencies for wxPython (macOS only)
        if: runner.os == 'macOS'
        run: |
          brew update
          # The following are common dependencies for wxPython on macOS,
          # but for most users, wxPython wheels work out of the box.
          # Uncomment or add as needed.
          # brew install gtk+3 sdl2

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install poetry dependencies
        run: poetry install --no-interaction

      - name: Check import sorting with isort
        run: poetry run isort --check-only .

      - name: Check code formatting with black
        run: poetry run black --check .

      - name: Type checking with mypy
        run: poetry run mypy .

      - name: Run tests with pytest
        run: poetry run pytest tests
